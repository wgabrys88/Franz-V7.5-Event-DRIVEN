<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Panel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a35;
  --accent:#4a9eff;--ok:#3ecf8e;--err:#ff4455;--warn:#f0a000;--purple:#c084fc;
  --text:#e8e8f0;--dim:#6b6b80;--mid:#a0a0b8;
  --mono:"Cascadia Code","Fira Code","Consolas",monospace;
  --block-min-w:340px;--img-max-h:220px
}
html,body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#topbar{
  display:flex;align-items:center;gap:12px;padding:7px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0
}
#topbar-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
#block-count{font-family:var(--mono);font-size:11px;color:var(--mid)}
#dot{width:7px;height:7px;border-radius:50%;background:var(--err);flex-shrink:0;margin-left:auto}
#dot.live{background:var(--ok)}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--block-min-w),1fr));
  flex:1;min-height:0;gap:1px;background:var(--border);
  overflow:auto;grid-auto-rows:min-content
}

.block{
  background:var(--bg);display:flex;flex-direction:column;
  border:1px solid var(--border);overflow:hidden
}
.block.master{resize:both;overflow:auto}
.block-head{
  display:flex;align-items:center;gap:8px;padding:5px 10px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0
}
.block-agent{
  font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 9px;border-radius:10px
}
.block-ts{font-family:var(--mono);font-size:10px;color:var(--dim);margin-left:auto}

.row-images{
  display:flex;gap:1px;background:var(--border);flex-shrink:0;
  min-height:60px;max-height:var(--img-max-h)
}
.img-half{
  flex:1;display:flex;align-items:center;justify-content:center;padding:4px;
  background:var(--bg);min-width:0;min-height:0;overflow:hidden;position:relative
}
.img-half img{max-width:100%;max-height:100%;object-fit:contain;display:none}
.img-half .tag{
  position:absolute;top:3px;left:5px;font-family:var(--mono);font-size:8px;
  color:var(--dim);text-transform:uppercase;letter-spacing:.08em;pointer-events:none
}
.img-half .ph{color:var(--border);font-size:10px;font-family:var(--mono)}

.row-sys,.row-usr,.row-reply{
  flex-shrink:0;padding:4px 10px;font-family:var(--mono);font-size:9px;
  line-height:1.45;white-space:pre-wrap;word-break:break-word;
  border-bottom:1px solid var(--border);max-height:120px;overflow:auto
}
.row-sys{color:#a78bfa;background:rgba(167,139,250,0.04)}
.row-sys::before{content:"SYS ";color:#7c3aed;font-weight:700}
.row-usr{color:#60a5fa;background:rgba(96,165,250,0.04)}
.row-usr::before{content:"USR ";color:#2563eb;font-weight:700}
.row-reply{color:#34d399;background:rgba(52,211,153,0.04)}
.row-reply::before{content:"VLM ";color:#059669;font-weight:700}
.row-sys .ph,.row-usr .ph,.row-reply .ph{color:var(--border);font-weight:normal}

#notif-bar{
  flex-shrink:0;display:flex;gap:1px;overflow-x:auto;overflow-y:hidden;
  background:var(--border);border-top:1px solid var(--border);min-height:0;max-height:26px
}
.notif{
  background:var(--surface2);padding:3px 10px;font-family:var(--mono);font-size:9px;
  color:var(--dim);display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0
}
.notif .ndot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.notif .ndot.ok{background:var(--ok)}
.notif .ndot.err{background:var(--err)}
.notif .ndot.warn{background:var(--warn)}
.notif .nagent{font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.notif .nts{color:var(--border)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-title">Panel</span>
  <span id="block-count">0 blocks</span>
  <div id="dot"></div>
</div>
<div id="grid"></div>
<div id="notif-bar"></div>

<script type="module">
const IS_FILE = location.protocol === 'file:';
const PANEL_ORIGIN = IS_FILE ? 'http://127.0.0.1:1236' : '';
const SENTINEL = 'NONE';
const grid = document.getElementById('grid');
const dot = document.getElementById('dot');
const blockCountEl = document.getElementById('block-count');
const notifBar = document.getElementById('notif-bar');
const colorMap = new Map();
const COLORS = ['#4a9eff','#3ecf8e','#f0a000','#c084fc','#ff4455','#06b6d4','#f97316','#a3e635'];
let colorIdx = 0;
let blockTotal = 0;
let masterBlock = null;
const agentBlocks = new Map();

function plog(level, msg, extra) {
  const entry = {level, msg, ts: Date.now()};
  if (extra) entry.extra = extra;
  try { fetch(`${PANEL_ORIGIN}/panel-log`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry)}); } catch (err) { console.warn('plog:', err); }
}

function agentColor(name) {
  if (!colorMap.has(name)) colorMap.set(name, COLORS[(colorIdx++) % COLORS.length]);
  return colorMap.get(name);
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function tsNow() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}.${d.getMilliseconds().toString().padStart(3,'0')}`;
}

function updateCount() {
  blockCountEl.textContent = `${blockTotal} block${blockTotal === 1 ? '' : 's'}`;
}

function showImg(imgEl, phEl, b64) {
  imgEl.style.display = 'block';
  phEl.style.display = 'none';
  imgEl.src = `data:image/png;base64,${b64}`;
}

function resetImg(imgEl, phEl, phText) {
  imgEl.style.display = 'none';
  imgEl.removeAttribute('src');
  phEl.style.display = '';
  phEl.textContent = phText;
}

function createBlock(agent) {
  const color = agentColor(agent);
  const block = document.createElement('div');
  block.className = 'block';
  blockTotal++;

  if (!masterBlock) {
    block.classList.add('master');
    masterBlock = block;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) {
        const w = e.contentRect.width;
        if (w > 0) document.documentElement.style.setProperty('--block-min-w', `${w}px`);
      }
    });
    ro.observe(block);
  }

  const head = document.createElement('div');
  head.className = 'block-head';
  const pill = document.createElement('span');
  pill.className = 'block-agent';
  pill.style.background = hexToRgba(color, 0.15);
  pill.style.color = color;
  pill.textContent = agent;
  const ts = document.createElement('span');
  ts.className = 'block-ts';
  ts.textContent = tsNow();
  head.append(pill, ts);

  const rowImg = document.createElement('div');
  rowImg.className = 'row-images';
  const leftHalf = document.createElement('div');
  leftHalf.className = 'img-half';
  const leftTag = document.createElement('span');
  leftTag.className = 'tag';
  leftTag.textContent = 'raw';
  const leftImg = document.createElement('img');
  leftImg.alt = '';
  const leftPh = document.createElement('span');
  leftPh.className = 'ph';
  leftPh.textContent = 'no image';
  leftHalf.append(leftTag, leftImg, leftPh);

  const rightHalf = document.createElement('div');
  rightHalf.className = 'img-half';
  const rightTag = document.createElement('span');
  rightTag.className = 'tag';
  rightTag.textContent = 'annotated';
  const rightImg = document.createElement('img');
  rightImg.alt = '';
  const rightPh = document.createElement('span');
  rightPh.className = 'ph';
  rightPh.textContent = 'pending';
  rightHalf.append(rightTag, rightImg, rightPh);
  rowImg.append(leftHalf, rightHalf);

  const rowSys = document.createElement('div');
  rowSys.className = 'row-sys';
  const sysPh = document.createElement('span');
  sysPh.className = 'ph';
  sysPh.textContent = '\u2014';
  rowSys.appendChild(sysPh);

  const rowUsr = document.createElement('div');
  rowUsr.className = 'row-usr';
  const usrPh = document.createElement('span');
  usrPh.className = 'ph';
  usrPh.textContent = '\u2014';
  rowUsr.appendChild(usrPh);

  const rowReply = document.createElement('div');
  rowReply.className = 'row-reply';
  const replyPh = document.createElement('span');
  replyPh.className = 'ph';
  replyPh.textContent = '\u2014';
  rowReply.appendChild(replyPh);

  block.append(head, rowImg, rowSys, rowUsr, rowReply);
  grid.appendChild(block);
  updateCount();

  return {
    block, leftImg, leftPh, rightImg, rightPh,
    rowSys, rowUsr, rowReply, tsEl: ts
  };
}

function getOrCreateBlock(agent) {
  if (agentBlocks.has(agent)) return agentBlocks.get(agent);
  const refs = createBlock(agent);
  agentBlocks.set(agent, refs);
  return refs;
}

function setRowContent(row, text, sentinel) {
  if (text && text !== sentinel) {
    row.textContent = '';
    row.textContent = text;
  } else {
    row.textContent = '';
    const ph = document.createElement('span');
    ph.className = 'ph';
    ph.textContent = '\u2014';
    row.appendChild(ph);
  }
}

function updateBlock(b, d) {
  b.tsEl.textContent = tsNow();
  if (d.raw_image_b64 && d.raw_image_b64 !== SENTINEL) {
    showImg(b.leftImg, b.leftPh, d.raw_image_b64);
  } else {
    resetImg(b.leftImg, b.leftPh, 'no image');
  }
  if (d.annotated_image_b64 && d.annotated_image_b64 !== SENTINEL) {
    showImg(b.rightImg, b.rightPh, d.annotated_image_b64);
  } else {
    resetImg(b.rightImg, b.rightPh, 'pending');
  }
  setRowContent(b.rowSys, d.system_prompt, SENTINEL);
  setRowContent(b.rowUsr, d.user_message, SENTINEL);
  setRowContent(b.rowReply, d.vlm_reply, SENTINEL);
}

function createNotif(agent, text, level) {
  const n = document.createElement('div');
  n.className = 'notif';
  const ndot = document.createElement('span');
  ndot.className = `ndot ${level}`;
  const na = document.createElement('span');
  na.className = 'nagent';
  na.textContent = agent;
  const nt = document.createElement('span');
  nt.textContent = text;
  const nts = document.createElement('span');
  nts.className = 'nts';
  nts.textContent = tsNow();
  n.append(ndot, na, nt, nts);
  notifBar.appendChild(n);
  notifBar.scrollLeft = notifBar.scrollWidth;
}

async function postResult(requestId, imageB64) {
  try {
    await fetch(`${PANEL_ORIGIN}/result`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({request_id: requestId, image_b64: imageB64})});
  } catch (err) {
    plog('error', 'result_post_failed', {request_id: requestId, error: String(err)});
  }
}

const drawPolygonOn = (ctx, ov, w, h) => {
  const N = 1000;
  const pts = (ov.points||[]).map(p=>[(p[0]||0)*w/N,(p[1]||0)*h/N]);
  if (pts.length < 2) return;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  if (ov.closed) ctx.closePath();
  if (ov.fill){ctx.fillStyle=ov.fill;ctx.fill();}
  if (ov.stroke){ctx.strokeStyle=ov.stroke;ctx.lineWidth=ov.stroke_width||1;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();}
  if (ov.label && pts.length > 0) {
    let cx = 0, cy = 0;
    for (const p of pts) { cx += p[0]; cy += p[1]; }
    cx /= pts.length; cy /= pts.length;
    const fontSize = Math.max(10, Math.min(w, h) * 0.025);
    ctx.font = `bold ${fontSize}px system-ui,sans-serif`;
    const metrics = ctx.measureText(ov.label);
    const tw = metrics.width;
    const th = fontSize;
    const pad = 3;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(cx - tw/2 - pad, cy - th/2 - pad, tw + pad*2, th + pad*2);
    ctx.fillStyle = ov.stroke || '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ov.label, cx, cy);
  }
};

const renderAnnotated = async (raw_b64, overlays) => {
  const img = await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=`data:image/png;base64,${raw_b64}`;});
  const oc = new OffscreenCanvas(img.naturalWidth, img.naturalHeight);
  const ctx = oc.getContext('2d');
  ctx.drawImage(img,0,0);
  for (const ov of overlays) drawPolygonOn(ctx, ov, img.naturalWidth, img.naturalHeight);
  const blob = await oc.convertToBlob({type:'image/png'});
  const buf = await blob.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
};

const es = new EventSource(`${PANEL_ORIGIN}/agent-events?agent=ui`);
es.addEventListener('connected', () => { dot.className = 'live'; plog('info', 'sse_connected'); });
es.onerror = () => { dot.className = ''; plog('warn', 'sse_error'); };

es.addEventListener('annotate', async e => {
  let d;
  try { d = JSON.parse(e.data); } catch (err) { plog('error', 'annotate_json_parse_failed', {error: String(err)}); return; }
  plog('info', 'annotate_received', {request_id: d.request_id, agent: d.agent, overlays_count: (d.overlays||[]).length, has_image: d.image_b64 !== SENTINEL});

  if (d.image_b64 !== SENTINEL) {
    if ((d.overlays||[]).length > 0) {
      try {
        const annotated_b64 = await renderAnnotated(d.image_b64, d.overlays);
        await postResult(d.request_id, annotated_b64);
        plog('info', 'annotate_rendered', {request_id: d.request_id});
      } catch (err) {
        plog('error', 'annotate_render_failed', {request_id: d.request_id, error: String(err)});
      }
    } else {
      await postResult(d.request_id, d.image_b64);
      plog('info', 'annotate_passthrough', {request_id: d.request_id});
    }
  } else {
    await postResult(d.request_id, SENTINEL);
    plog('info', 'annotate_no_image', {request_id: d.request_id});
  }
});

es.addEventListener('message', e => {
  let d;
  try { d = JSON.parse(e.data); } catch (err) { plog('error', 'message_json_parse_failed', {error: String(err)}); return; }
  const sender = d.sender || 'unknown';
  const eventType = d.event_type || 'unknown';

  if (eventType === 'vlm_cycle') {
    const b = getOrCreateBlock(sender);
    updateBlock(b, d);
    plog('info', 'vlm_cycle_displayed', {sender, request_id: d.request_id || SENTINEL});
    return;
  }

  if (eventType === 'status') {
    createNotif(sender, d.status || '', 'ok');
    return;
  }

  if (eventType === 'error') {
    createNotif(sender, d.text || 'error', 'err');
    return;
  }

  createNotif(sender, `${eventType}: ${d.text || d.status || ''}`, 'warn');
  plog('info', 'message_received', {sender, event_type: eventType, request_id: d.request_id || SENTINEL});
});
</script>
</body>
</html>
